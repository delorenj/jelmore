project_name: "jelmore"
project_type: "api"  # CLI tool - unified interface for agentic coders
project_level: 1  # 0-4 (0=single story, 1=1-10 stories, 2=5-15, 3=12-40, 4=40+)

# Project Context (from kickoff notes)
description: "CLI tool providing unified interface for multiple agentic coders (Claude Code, Gemini CLI, Codex). Event-driven architecture with provider abstraction, session management (continue/resume), and cross-provider session search."

# Initial Scope
initial_providers:
  - "Claude Code"
  - "Gemini CLI"
  - "Codex"

# Architecture Principles
architecture_notes: "High modularity, low code duplication, Gang of Four patterns (creational, behavioral, structural). Event-driven with pure event bus integration."

